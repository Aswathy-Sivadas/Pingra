name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: lint & build frontend ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/chat-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/chat-app
        run: npm ci

      - name: Lint
        working-directory: frontend/chat-app
        run: npm run lint

      - name: Build
        working-directory: frontend/chat-app
        run: npm run build

  # ── CI: syntax-check backend ───────────────────────────────────────────────
  backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: node --check src/server.js

  # ── CD: deploy to Render (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [frontend, backend]        # only deploy if CI passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK secret is not set — skipping deploy trigger."
            exit 0
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Deploy hook returned $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deploy triggered successfully"
