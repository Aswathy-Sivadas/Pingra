name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: lint & build frontend ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/chat-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/chat-app
        run: npm ci

      - name: Lint
        working-directory: frontend/chat-app
        run: npm run lint

      - name: Build
        working-directory: frontend/chat-app
        run: npm run build

  # ── CI: syntax-check backend ───────────────────────────────────────────────
  backend:
    name: Backend — Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: node --check src/server.js

  # ── CD: deploy to Render (main branch only) ────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [frontend, backend]        # only deploy if CI passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
